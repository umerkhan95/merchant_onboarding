services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: uv run celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  flower:
    build: .
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    command: uv run celery -A app.workers.celery_app flower --port=5555

volumes:
  redis_data:

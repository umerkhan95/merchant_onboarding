services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/merchant_onboarding
      - REDIS_URL=redis://redis:6379/0
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: merchant_onboarding
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery_worker:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/merchant_onboarding
      - REDIS_URL=redis://redis:6379/0
    command: uv run celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  flower:
    build: .
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    command: uv run celery -A app.workers.celery_app flower --port=5555

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_KEY=${API_KEY:-dev-key}

volumes:
  redis_data:
  postgres_data:
